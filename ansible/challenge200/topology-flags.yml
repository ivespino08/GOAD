---
# topology-flags.yml
# Injects CTF flag artifacts into running Docker containers.
# Must run AFTER topology-docker.yml.
#
# Flag file naming: the ctf/flags role looks for files/{{hostname}}_{{item.filename}}
# so filename should be the BASE NAME ONLY (without hostname prefix).
# e.g. filename: "secrets.txt" → role finds files/challenge200-docker-1_secrets.txt (hostname var below is scenario-qualified purely for this lookup -- hosts: still targets the real inventory host)
#
# container_name must match the same derivation used in topology-docker.yml
# and the container_name set in that vuln's docker-compose.yml.
#
# CHALLENGE200-SPECIFIC FILE: the real topology-flags.yml (Scenario3) hardcodes
# per-host plays with literal hostnames and flag_files inline in the playbook —
# it does NOT read flag_files from config.json generically the way I'd assumed
# when I originally put a "flag_files" block into Challenge200's config.json.
# That config.json data was never actually consumed; this file is the real
# mechanism, adapted to Challenge200's two hosts/containers/paths below.

- import_playbook: ../data.yml
  vars:
    data_path: "../../ad/Challenge200/data"
  tags: 'data'

- name: "Inject flags into docker-1"
  hosts: docker-1
  become: true
  roles:
    - { role: 'ctf/flags', tags: 'flags' }
  vars:
    hostname: "challenge200-{{lab.hosts[dict_key].hostname}}"
    container_name: "struts2-vuln-s2-057"
    flag_files:
      - filename: "secrets.txt"
        container_path: "/root/secrets.txt"
        mode: "0644"

- name: "Inject flags into docker-2"
  hosts: docker-2
  become: true
  roles:
    - { role: 'ctf/flags', tags: 'flags' }
  vars:
    hostname: "challenge200-{{lab.hosts[dict_key].hostname}}"
    container_name: "struts2-vuln-s2-048"
    flag_files:
      - filename: "secrets.txt"
        container_path: "/opt/app/secrets.txt"
        mode: "0644"
