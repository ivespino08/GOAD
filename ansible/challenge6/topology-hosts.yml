---
# topology-hosts.yml
#
# Adds each pc/server/docker host's lab IP as a secondary address on eth1,
# PERSISTENTLY, via a systemd oneshot unit (roles/network/persist_boot_commands).
# Mirrors Scenario12's topology-hosts.yml exactly, extended to include the
# "servers" group (Scenario12 is a flat LAN with no server-type hosts;
# Challenge6 has server-4).
#
# eth0 = NAT (do not touch), eth1 = management (192.168.57.x) + lab IP (secondary, persisted)

- import_playbook: ../data.yml
  vars:
    data_path: "../ad/Challenge6/data"
  tags: 'data'

- name: "Persist PC lab IPs on eth1"
  hosts: pcs
  become: true
  roles:
    - role: 'network/persist_boot_commands'
      vars:
        persist_unit_name: "lab-ip-eth1"
        persist_description: "Persist lab IP on eth1 across reboots"
        persist_commands:
          - "ip addr add {{lab.hosts[dict_key].ip4}} dev eth1 || true"

- name: "Persist server lab IPs on eth1"
  hosts: servers
  become: true
  roles:
    - role: 'network/persist_boot_commands'
      vars:
        persist_unit_name: "lab-ip-eth1"
        persist_description: "Persist lab IP on eth1 across reboots"
        persist_commands:
          - "ip addr add {{lab.hosts[dict_key].ip4}} dev eth1 || true"

- name: "Persist Docker host lab IPs on eth1"
  hosts: docker_nodes
  become: true
  roles:
    - role: 'network/persist_boot_commands'
      vars:
        persist_unit_name: "lab-ip-eth1"
        persist_description: "Persist lab IP on eth1 across reboots"
        persist_commands:
          - "ip addr add {{lab.hosts[dict_key].ip4}} dev eth1 || true"
