# roles/ctf/flags/tasks/main.yml
#
# container_name is now passed in from the calling playbook (e.g.
# topology-flags.yml) instead of being hardcoded here — it must match
# whatever container_name topology-docker.yml derived/used for that host.
# Flag file source convention: files/{{hostname}}_{{item.filename}}
# So topology-flags.yml should pass filename WITHOUT the hostname prefix.
---
- name: "Create flag staging directory"
  ansible.builtin.file:
    path: /tmp/flags
    state: directory
    mode: "0755"

- name: "Copy flag artifacts for {{hostname}}"
  ansible.builtin.copy:
    src: "files/{{hostname}}_{{item.filename}}"
    dest: "/tmp/flags/{{item.filename}}"
    mode: "0644"
  loop: "{{flag_files | default([])}}"
  loop_control:
    label: "{{item.filename}}"

- name: "Inject flags into running container"
  community.docker.docker_container_exec:
    container: "{{container_name}}"
    command: "mkdir -p {{item.container_path | dirname}}"
  loop: "{{flag_files | default([])}}"
  loop_control:
    label: "mkdir {{item.container_path | dirname}}"

- name: "Copy flag file into container at correct path"
  ansible.builtin.command:
    cmd: >
      docker cp /tmp/flags/{{item.filename}}
      {{container_name}}:{{item.container_path}}
  loop: "{{flag_files | default([])}}"
  loop_control:
    label: "{{item.filename}} → {{item.container_path}}"
  register: flag_copy
  changed_when: flag_copy.rc == 0

- name: "Set flag file permissions inside container"
  community.docker.docker_container_exec:
    container: "{{container_name}}"
    command: "chmod {{item.mode | default('0644')}} {{item.container_path}}"
  loop: "{{flag_files | default([])}}"
  loop_control:
    label: "chmod {{item.container_path}}"
