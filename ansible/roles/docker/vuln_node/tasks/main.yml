# roles/docker/vuln_node/tasks/main.yml
#
# Generic role — vuln_name, vuln_compose_src, and container_name are
# passed as vars from topology-docker.yml. vuln_name drives directory
# names; vuln_compose_src is the path to the compose file to copy;
# container_name must match the container_name set inside that compose
# file exactly (used to confirm the container actually started).
---
- name: "Install Docker dependencies"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-docker
    state: present
    update_cache: yes

- name: "Add Docker GPG key"
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: "Add Docker apt repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: "Install Docker CE and Docker Compose plugin"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: "Enable and start Docker"
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: "Add vagrant user to docker group"
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: yes

- name: "Create /opt/vuln/{{ vuln_name | replace('/', '-') }} directory"
  ansible.builtin.file:
    path: "/opt/vuln/{{ vuln_name | replace('/', '-') }}"
    state: directory
    mode: "0755"

- name: "Copy docker-compose.yml for {{ vuln_name }}"
  ansible.builtin.copy:
    src: "{{ vuln_compose_src }}"
    dest: "/opt/vuln/{{ vuln_name | replace('/', '-') }}/docker-compose.yml"
    mode: "0644"
  register: compose_result

- name: "Start vulnerable container via Docker Compose"
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "/opt/vuln/{{ vuln_name | replace('/', '-') }}"
  when: compose_result.changed
  register: compose_up
  until: compose_up is not failed
  retries: 3
  delay: 10

- name: "Confirm container {{ container_name }} is running"
  community.docker.docker_container_info:
    name: "{{ container_name }}"
  register: container_info
  until: container_info.container is not none and container_info.container.State.Running
  retries: 10
  delay: 5
