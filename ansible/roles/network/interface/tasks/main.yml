# roles/network/interface/tasks/main.yml
---
- name: "Update apt cache before installing dependencies"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Install network-manager and netaddr"
  ansible.builtin.package:
    name:
      - network-manager
      - python3-netaddr
    state: present

- name: "Configure interface {{interface_name}} with {{interface_ip4}}"
  ansible.builtin.nmcli:
    conn_name: "{{interface_name}}"
    ifname: "{{interface_name}}"
    type: ethernet
    ip4: "{{interface_ip4}}"
    gw4: "{{gateway_ip4 | default(omit)}}"
    never_default4: "{{true if gateway_ip4 is not defined else false}}"
    autoconnect: yes
    state: present
  register: interface_result

- name: "Bring up {{interface_name}}"
  ansible.builtin.command:
    cmd: nmcli connection up "{{interface_name}}"
  when: interface_result.changed
