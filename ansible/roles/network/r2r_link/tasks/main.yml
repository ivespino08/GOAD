# roles/network/r2r_link/tasks/main.yml
#
# Fully owns r2r interface addressing (IP + peer route) for eth2/eth3.
# conn_name matches interface_name (e.g. "eth2") rather than a separate
# "r2r-{{peer_router}}" name — this reuses/updates the same nmcli
# connection profile instead of creating a second one on the same
# device, which previously caused two competing profiles per interface.
#
# Installs network-manager itself (not just python3-netaddr) — this role
# must not assume another role has already installed it. That assumption
# broke when topology-routers.yml's redundant interface play was removed.
---
- name: "Update apt cache before installing network-manager"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Install network-manager and python3-netaddr"
  ansible.builtin.package:
    name:
      - network-manager
      - python3-netaddr
    state: present

- name: "Configure r2r interface {{interface_name}} toward {{peer_router}} ({{link_subnet}})"
  ansible.builtin.nmcli:
    conn_name: "{{interface_name}}"
    ifname: "{{interface_name}}"
    type: ethernet
    ip4: "{{local_ip4}}"
    never_default4: true
    autoconnect: yes
    state: present
  register: r2r_result

- name: "Bring up r2r interface {{interface_name}}"
  ansible.builtin.command:
    cmd: nmcli connection up "{{interface_name}}"
  when: r2r_result.changed

- name: "Add static route to peer LAN via {{peer_ip4 | ansible.utils.ipaddr('address')}}"
  ansible.builtin.command:
    cmd: ip route add {{link_subnet}} via {{peer_ip4 | ansible.utils.ipaddr('address')}} dev {{interface_name}}
  register: route_add
  failed_when: route_add.rc != 0 and 'exists' not in route_add.stderr
  changed_when: route_add.rc == 0
