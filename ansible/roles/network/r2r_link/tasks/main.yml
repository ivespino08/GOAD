# roles/network/r2r_link/tasks/main.yml
#
# interface_name must be passed from the calling playbook.
# topology-links.yml derives it from the peer's position in
# lab.hosts[dict_key].r2r_interfaces.keys(), matching the eth{{peer_idx+1}}
# names assigned by topology-routers.yml.
---
- name: "Configure r2r interface toward {{peer_router}} ({{link_subnet}})"
  ansible.builtin.nmcli:
    conn_name: "r2r-{{peer_router}}"
    ifname: "{{interface_name}}"
    type: ethernet
    ip4: "{{local_ip4}}"
    never_default4: true
    autoconnect: yes
    state: present
  register: r2r_result

- name: "Bring up r2r interface toward {{peer_router}}"
  ansible.builtin.command:
    cmd: nmcli connection up "r2r-{{peer_router}}"
  when: r2r_result.changed

- name: "Add static route to peer LAN via {{peer_ip4 | ansible.utils.ipaddr('address')}}"
  ansible.builtin.command:
    cmd: ip route add {{link_subnet}} via {{peer_ip4 | ansible.utils.ipaddr('address')}} dev {{interface_name}}
  register: route_add
  failed_when: route_add.rc != 0 and 'exists' not in route_add.stderr
  changed_when: route_add.rc == 0
