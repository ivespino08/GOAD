# roles/network/services/dhcp_client/tasks/main.yml
---
- name: "Update apt cache before installing dhclient"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Install dhclient"
  ansible.builtin.package:
    name: isc-dhcp-client
    state: present

- name: "Configure {{interface_name}} for DHCP"
  ansible.builtin.nmcli:
    conn_name: "{{interface_name}}"
    ifname: "{{interface_name}}"
    type: ethernet
    method4: auto
    autoconnect: yes
    state: present
  register: dhcp_result

- name: "Bring up {{interface_name}} in DHCP mode"
  ansible.builtin.command:
    cmd: nmcli connection up "{{interface_name}}"
  when: dhcp_result.changed

- name: "Confirm DHCP lease acquired on {{interface_name}}"
  ansible.builtin.command:
    cmd: ip addr show {{interface_name}}
  register: dhcp_check
  changed_when: false
  until: "'inet ' in dhcp_check.stdout"
  retries: 10
  delay: 5
