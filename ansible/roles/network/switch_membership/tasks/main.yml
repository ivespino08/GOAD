# roles/network/switch_membership/tasks/main.yml
---
- name: "Update apt cache before installing bridge-utils"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Install bridge-utils and python3-netaddr"
  ansible.builtin.package:
    name:
      - bridge-utils
      - python3-netaddr
    state: present

- name: "Create bridge {{switch_name | regex_replace('[./]', '-')}}"
  ansible.builtin.nmcli:
    conn_name: "br-{{switch_name | regex_replace('[./]', '-')}}"
    ifname: "br-{{switch_name | regex_replace('[./]', '-')}}"
    type: bridge
    ip4: "{{lab.hosts[dict_key].ip4}}"
    autoconnect: yes
    state: present
  register: bridge_result

- name: "Bring up bridge {{switch_name | regex_replace('[./]', '-')}}"
  ansible.builtin.command:
    cmd: nmcli connection up "br-{{switch_name | regex_replace('[./]', '-')}}"
  when: bridge_result.changed

- name: "Attach LAN interface eth0 to bridge"
  ansible.builtin.nmcli:
    conn_name: "br-slave-eth0"
    ifname: "eth0"
    type: bridge-slave
    master: "br-{{switch_name | regex_replace('[./]', '-')}}"
    autoconnect: yes
    state: present
  register: slave_result

- name: "Bring up bridge slave eth0"
  ansible.builtin.command:
    cmd: nmcli connection up "br-slave-eth0"
  when: slave_result.changed
