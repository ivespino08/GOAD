---
# topology-flags.yml
# Injects CTF flag artifacts into running Docker containers.
# Must run AFTER topology-docker.yml.
#
# Flag file naming: the ctf/flags role looks for files/{{hostname}}_{{item.filename}}
# so filename should be the BASE NAME ONLY (without hostname prefix).
# e.g. filename: "operator_pin.hash" → role finds files/docker-11_operator_pin.hash
#
# container_name must match the same derivation used in topology-docker.yml
# ("{app}-vuln-{cve_id|lower}") and the container_name set in that vuln's
# docker-compose.yml — the ctf/flags role no longer hardcodes this.

- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

- name: "Inject flags into docker-11"
  hosts: docker-11
  become: true
  roles:
    - { role: 'ctf/flags', tags: 'flags' }
  vars:
    hostname: "{{lab.hosts[dict_key].hostname}}"
    container_name: "git-vuln-cve-2017-8386"
    flag_files:
      - filename: "operator_pin.hash"
        container_path: "/etc/pam.d/fragments/operator_pin.hash"
        mode: "0644"
      - filename: "operator_pin.hash"
        container_path: "/opt/badges/pins/operator_pin.hash"
        mode: "0644"

- name: "Inject flags into docker-12"
  hosts: docker-12
  become: true
  roles:
    - { role: 'ctf/flags', tags: 'flags' }
  vars:
    hostname: "{{lab.hosts[dict_key].hostname}}"
    container_name: "git-vuln-cve-2017-8386"
    flag_files:
      - filename: "backup_index.html"
        container_path: "/var/www/html/backups/backup_index.html"
        mode: "0644"
