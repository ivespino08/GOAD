---
# topology-hosts.yml
# Adds each host's lab IP as a secondary address on eth1.
# eth0 = NAT (do not touch)
# eth1 = management (192.168.57.x) + lab IP (secondary)
#
# Hosts also get a route to the HITL participant network via their
# router's LAN IP, so return traffic traverses the chain correctly.

- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

- name: "Add PC lab IPs to eth1"
  hosts: pcs
  become: true
  tasks:
    - name: "Add {{lab.hosts[dict_key].ip4}} to eth1"
      ansible.builtin.command:
        cmd: ip addr add {{lab.hosts[dict_key].ip4}} dev eth1
      register: lab_ip
      failed_when: lab_ip.rc != 0 and 'File exists' not in lab_ip.stderr
      changed_when: lab_ip.rc == 0

- name: "Add Docker host lab IPs to eth1"
  hosts: docker_nodes
  become: true
  tasks:
    - name: "Add {{lab.hosts[dict_key].ip4}} to eth1"
      ansible.builtin.command:
        cmd: ip addr add {{lab.hosts[dict_key].ip4}} dev eth1
      register: lab_ip
      failed_when: lab_ip.rc != 0 and 'File exists' not in lab_ip.stderr
      changed_when: lab_ip.rc == 0
