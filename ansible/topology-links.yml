---
# topology-links.yml
# Configures point-to-point (r2r) links between routers.
#
# interface_name is derived from the peer's position in
# lab.hosts[dict_key].r2r_interfaces.keys() — the same ordered list
# topology-routers.yml iterates with peer_idx — so both playbooks assign
# the same eth{{n}} name to the same physical interface.

- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

- name: "Configure router-to-router links"
  hosts: routers
  become: true
  tasks:
    - include_role:
        name: "network/r2r_link"
      vars:
        # Derive interface name by finding peer's index in the r2r_interfaces
        # key order — must match the eth{{peer_idx+1}} assignment in
        # topology-routers.yml exactly.
        interface_name: >-
          {{"eth" + (
            (lab.hosts[dict_key].r2r_interfaces.keys() | list).index(
              item.routers
              | rejectattr('id', 'equalto', dict_key)
              | map(attribute='id')
              | first
            ) + 1
          ) | string}}
        local_router: "{{dict_key}}"
        local_ip4: >-
          {{
            item.routers
            | selectattr('id', 'equalto', dict_key)
            | map(attribute='ip')
            | first
          }}
        peer_router: >-
          {{
            item.routers
            | rejectattr('id', 'equalto', dict_key)
            | map(attribute='id')
            | first
          }}
        peer_ip4: >-
          {{
            item.routers
            | rejectattr('id', 'equalto', dict_key)
            | map(attribute='ip')
            | first
          }}
        link_subnet: "{{item.subnet}}"
      loop: >-
        {{
          lab.topology.r2r_links
          | selectattr('routers', 'selectattr', 'id', 'equalto', dict_key)
        }}
      loop_control:
        label: "edge {{item.edge_id}} — {{item.subnet}}"
