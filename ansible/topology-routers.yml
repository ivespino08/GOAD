---
# topology-routers.yml
# Interface layout per router VM:
#   eth0 = NAT (do not touch — Vagrant management)
#   eth1 = management 192.168.57.x (added by template :ip)
#   eth2 = first r2r link (added by template :networks[0], peer_idx 0)
#   eth3 = second r2r link (added by template :networks[1], peer_idx 1)
#
# Router LAN gateway IPs are added as secondary addresses on eth1.
# There is no dedicated LAN interface — the management interface carries
# both the management IP and the lab LAN IP as a secondary.
#
# NOTE: r2r interface addressing (eth2/eth3) is NOT configured here.
# It used to be configured via the network/interface role in this file
# AND again via the network/r2r_link role in topology-links.yml — two
# separate nmcli connection profiles fighting over the same device.
# network/r2r_link fully owns r2r interface addressing (IP + peer route),
# so the duplicate play was removed. See topology-links.yml.

- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

# Add the router's LAN gateway IP as a secondary address on eth1.
# FRR sees this as a connected route for the LAN subnet and advertises
# it to r2r neighbours via RIP.
- name: "Add router LAN IP to eth1"
  hosts: routers
  become: true
  tasks:
    - name: "Add {{lab.hosts[dict_key].ip4}} to eth1"
      ansible.builtin.command:
        cmd: ip addr add {{lab.hosts[dict_key].ip4}} dev eth1
      register: lan_ip
      failed_when: lan_ip.rc != 0 and 'File exists' not in lan_ip.stderr
      changed_when: lan_ip.rc == 0
