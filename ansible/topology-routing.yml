---
# topology-routing.yml
# Configures RIP routing on all routers via FRR.
# Mirrors the style of ad-relations.yml.

- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

- name: "Configure RIP routing on all routers"
  hosts: routers
  roles:
    - { role: 'network/rip', tags: 'rip' }
  vars:
    routing_protocol: "{{lab.hosts[dict_key].protocol}}"
    rip_networks_lan:
      - "{{lab.hosts[dict_key].lan_subnet}}"
    rip_networks_r2r: >-
      {{
        lab.topology.r2r_links
        | selectattr('routers', 'selectattr', 'id', 'equalto', dict_key)
        | map(attribute='subnet')
        | list
      }}
    rip_networks: "{{rip_networks_lan + rip_networks_r2r}}"
    rip_passive_interfaces: ["eth0"]
