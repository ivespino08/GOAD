---
- import_playbook: data.yml
  vars:
    data_path: "../ad/Scenario3/data"
  tags: 'data'

- name: "Configure DHCP client on applicable hosts"
  hosts: dhcp_clients
  become: true
  roles:
    - { role: 'network/services/dhcp_client', tags: 'dhcp_client' }
  vars:
    hostname: "{{lab.hosts[dict_key].hostname}}"
    interface_name: "eth0"
    lan_subnet: "{{lab.hosts[dict_key].lan_subnet}}"
    gateway_ip4: "{{lab.hosts[dict_key].gateway}}"

- name: "Configure additional per-host services"
  hosts: domain
  become: true
  tasks:
    - include_role:
        name: "network/services/{{service}}"
      vars:
        hostname: "{{lab.hosts[dict_key].hostname}}"
        lan_subnet: "{{lab.hosts[dict_key].lan_subnet}}"
      loop: "{{lab.hosts[dict_key].services | default([])}}"
      loop_control:
        loop_var: service
